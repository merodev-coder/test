<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أنت غير متصل - أبو كارتونة</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f5f4 0%, #e7e5e4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }
    
    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .offline-icon svg {
      width: 40px;
      height: 40px;
      color: #d97706;
    }
    
    h1 {
      font-size: 24px;
      color: #1c1917;
      margin-bottom: 12px;
      font-weight: 700;
    }
    
    p {
      font-size: 16px;
      color: #78716c;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background: #059669;
      color: white;
    }
    
    .btn-primary:hover {
      background: #047857;
    }
    
    .btn-secondary {
      background: #f5f5f4;
      color: #57534e;
    }
    
    .btn-secondary:hover {
      background: #e7e5e4;
    }
    
    .cached-notice {
      margin-top: 24px;
      padding: 16px;
      background: #ecfdf5;
      border-radius: 12px;
      border: 1px solid #a7f3d0;
    }
    
    .cached-notice svg {
      width: 20px;
      height: 20px;
      color: #059669;
      margin-bottom: 8px;
    }
    
    .cached-notice p {
      font-size: 14px;
      color: #065f46;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>يبدو أنك فقدت الاتصال. يمكنك الاستمرار في تصفح المنتجات المخزنة محلياً أو حاول إعادة الاتصال.</p>
    
    <div class="actions">
      <button class="btn-primary" onclick="window.location.reload()">
        إعادة المحاولة
      </button>
      <button class="btn-secondary" onclick="window.location.href='/'">
        الصفحة الرئيسية
      </button>
    </div>
    
    <div class="cached-notice">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p>المنتجات التي شاهدتها سابقاً متاحة بدون إنترنت</p>
    </div>
  </div>
  
  <script>
    // Check for connection restoration
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // Check if actually offline or just slow connection
    fetch('/api/health', { method: 'HEAD', cache: 'no-store' })
      .then(() => {
        // We're actually online, reload
        window.location.reload();
      })
      .catch(() => {
        // Truly offline
        console.log('Confirmed offline state');
      });
  </script>
</body>
</html>
